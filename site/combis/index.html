<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rutas de Tehuacán — mapa de combis</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="routes.js"></script>
<script src="sponsors.js"></script>
<style>
  :root {
    --bg: #f5f5f7; --panel: rgba(248,248,250,.92); --ink: #1d1d1f; --ink-2: #6e6e73;
    --line: rgba(0,0,0,.08); --accent: #0071e3; --chip: rgba(255,255,255,.85); --ok: #1a7f37;
    --glass: rgba(255,255,255,.65);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme=light]) {
      --bg: #131316; --panel: rgba(24,24,28,.94); --ink: #f5f5f7; --ink-2: #98989d;
      --line: rgba(255,255,255,.10); --accent: #0a84ff; --chip: rgba(58,58,64,.55); --ok: #4ecb71;
      --glass: rgba(28,28,32,.6);
    }
  }
  :root[data-theme=dark] {
    --bg: #131316; --panel: rgba(24,24,28,.94); --ink: #f5f5f7; --ink-2: #98989d;
    --line: rgba(255,255,255,.10); --accent: #0a84ff; --chip: rgba(58,58,64,.55); --ok: #4ecb71;
    --glass: rgba(28,28,32,.6);
  }
  .ic-sun { display: none; }
  :root[data-theme=dark] .ic-sun { display: inline; }
  :root[data-theme=dark] .ic-moon { display: none; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.45 system-ui, -apple-system, sans-serif; color: var(--ink); background: var(--bg);
         display: flex; flex-direction: column; height: 100dvh; }
  #topbar { display: flex; align-items: center; gap: 14px; padding: 0 14px; height: 46px; flex: none;
            border-bottom: 1px solid var(--line); background: var(--panel); }
  #topbar .brand { color: var(--ink); text-decoration: none; font-weight: 700; font-size: 16px; }
  #topbar .brand span { color: var(--accent); }
  #topbar nav { display: flex; gap: 4px; margin-left: auto; }
  #topbar nav a { color: var(--ink-2); text-decoration: none; font-size: 13px; padding: 5px 10px; border-radius: 8px; }
  #topbar nav a.on, #topbar nav a:hover { color: var(--ink); background: var(--chip); }
  #app { display: flex; flex: 1; min-height: 0; }
  body.embed #topbar, body.embed #sidebar { display: none; }
  #sidebar { width: 340px; min-width: 280px; background: var(--panel); border-right: 1px solid var(--line);
             display: flex; flex-direction: column; }
  #sidebar header { padding: 14px 16px 10px; border-bottom: 1px solid var(--line); }
  #sidebar h1 { font-size: 16px; margin: 0 0 2px; }
  #sidebar .sub { color: var(--ink-2); font-size: 12px; }
  #tabs { display: flex; border-bottom: 1px solid var(--line); }
  #tabs button { flex: 1; padding: 9px 0; font-size: 13px; background: none; border: none; cursor: pointer;
                 color: var(--ink-2); border-bottom: 2px solid transparent; }
  #tabs button.on { color: var(--ink); border-bottom-color: var(--accent); font-weight: 600; }
  .pane { flex: 1; display: none; flex-direction: column; min-height: 0; }
  .pane.on { display: flex; }
  #controls, #planner { padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--line); }
  input[type=search], input[type=text] { width: 100%; padding: 7px 10px; border: 1px solid var(--line); border-radius: 8px;
            background: var(--chip); color: var(--ink); font-size: 13px; }
  input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .filters { display: flex; gap: 6px; }
  .filters button { flex: 1; padding: 5px 0; font-size: 12px; border: 1px solid var(--line); border-radius: 999px;
                    background: var(--chip); color: var(--ink-2); cursor: pointer; }
  .filters button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  #count { font-size: 11px; color: var(--ink-2); }
  #list, #results { flex: 1; overflow-y: auto; padding: 6px 8px; }
  .route { display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 8px; cursor: pointer; }
  .route:hover { background: var(--chip); }
  .route.sel { background: var(--chip); outline: 2px solid var(--accent); outline-offset: -2px; }
  .swatch { width: 14px; height: 14px; border-radius: 4px; flex: none; border: 1px solid rgba(0,0,0,.15); }
  .route .nm { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tag { font-size: 10px; padding: 1px 7px; border-radius: 999px; border: 1px solid var(--line); color: var(--ink-2); flex: none; }
  #detail { border-top: 1px solid var(--line); padding: 14px 16px; font-size: 13px; display: none; }
  #detail.show { display: block; }
  .dt-head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
  .dt-dot { width: 12px; height: 12px; border-radius: 50%; flex: none; box-shadow: 0 0 0 3px var(--chip); }
  .dt-name { font-size: 15px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden;
             text-overflow: ellipsis; white-space: nowrap; }
  .dt-pill { font-size: 10px; padding: 2px 9px; border-radius: 999px; border: 1px solid var(--line);
             color: var(--ink-2); flex: none; text-transform: uppercase; letter-spacing: .4px; }
  .dt-sched { display: flex; gap: 8px; margin: 2px 0 8px; }
  .dt-chip { flex: 1; min-width: 0; background: var(--chip); border: 1px solid var(--line);
             border-radius: 12px; padding: 7px 10px; }
  .dt-chip small { display: block; font-size: 9.5px; letter-spacing: .5px; text-transform: uppercase;
                   color: var(--ink-2); margin-bottom: 1px; }
  .dt-chip b { font-size: 14px; }
  .dt-note { font-size: 11px; color: var(--ink-2); margin: 0 0 8px; }
  .dt-meta { font-size: 11.5px; color: var(--ink-2); line-height: 1.55; border-top: 1px solid var(--line);
             padding-top: 8px; }
  .clear { font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: none; padding: 0; margin-top: 10px; }
  #map { flex: 1; position: relative; }
  .maplibregl-popup-content { font: 13px system-ui, sans-serif; padding: 8px 12px;
    background: var(--glass); color: var(--ink); border-radius: 12px;
    border: 1px solid var(--line); box-shadow: 0 8px 24px rgba(0,0,0,.18);
    -webkit-backdrop-filter: blur(18px) saturate(160%); backdrop-filter: blur(18px) saturate(160%); }
  /* planner */
  .field { position: relative; }
  .field .dot { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 9px; height: 9px;
                border-radius: 50%; }
  .field input { padding-left: 28px; padding-right: 34px; }
  .field .pin { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); border: none; background: none;
                cursor: pointer; font-size: 15px; padding: 4px 6px; border-radius: 6px; color: var(--ink-2); }
  .field .pin:hover, .field .pin.armed { background: var(--chip); color: var(--accent); }
  .sugg { position: absolute; top: 100%; left: 0; right: 0; z-index: 30; background: var(--bg);
          border: 1px solid var(--line); border-radius: 8px; margin-top: 3px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,.12); }
  .sugg div { padding: 7px 10px; font-size: 12.5px; cursor: pointer; }
  .sugg div:hover { background: var(--panel); }
  .sugg .muted { color: var(--ink-2); font-size: 11px; }
  #go { padding: 8px 0; border: none; border-radius: 8px; background: var(--accent); color: #fff;
        font-size: 13px; font-weight: 600; cursor: pointer; }
  #go:disabled { opacity: .5; cursor: default; }
  #plan-note { font-size: 11px; color: var(--ink-2); }
  .opt { padding: 10px 11px; border: 1px solid var(--line); border-radius: 10px; margin: 6px 2px; cursor: pointer; background: var(--chip); }
  .opt:hover { border-color: var(--accent); }
  .opt.sel { outline: 2px solid var(--accent); outline-offset: -1px; }
  .opt .legs { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; font-weight: 600; font-size: 13px; }
  .opt .legs .swatch { width: 11px; height: 11px; }
  .opt .meta { font-size: 11.5px; color: var(--ink-2); }
  .msg { padding: 14px; font-size: 12.5px; color: var(--ink-2); }
  .wmark { color: #d97706; font-weight: 700; }
  /* mobile: app layout — LIST view or MAP view, never both; bottom tab bar;
     selected route opens a bottom sheet in either view */
  #mbar, #mlist, #mtabs, #sheet { display: none; }
  @media (max-width: 700px) {
    #sidebar { display: none; }
    #app { position: relative; margin-bottom: calc(56px + env(safe-area-inset-bottom)); }
    #mbar { display: block; position: absolute; top: 10px; left: 10px; right: 10px; z-index: 15; }
    #mrow, #msugg { display: none; }
    body[data-mview=list] #mbar { display: none; }
    /* ---- list view ---- */
    #mlist { position: absolute; inset: 0; z-index: 18; background: var(--bg); overflow-y: auto;
             -webkit-overflow-scrolling: touch; padding: 12px 14px 24px; }
    body[data-mview=list] #mlist { display: block; }
    #ml-search { width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 12px;
                 background: var(--panel); color: var(--ink); font-size: 15px; }
    #ml-search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    #ml-pills { display: flex; gap: 8px; margin: 10px 0 4px; overflow-x: auto;
                -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
    #ml-pills button { flex: none; padding: 8px 15px; border-radius: 999px; border: 1px solid var(--line);
                       background: var(--panel); color: var(--ink-2); font-size: 13px; font-weight: 600; }
    #ml-pills button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    #ml-count { font-size: 12px; color: var(--ink-2); margin: 4px 0 6px; }
    .mcard { display: flex; align-items: center; gap: 11px; padding: 10px 2px 10px 0;
             border-bottom: 1px solid var(--line); cursor: pointer; }
    .mcard .bar { width: 3px; align-self: stretch; border-radius: 2px; flex: none; }
    .mcard .tile { width: 40px; height: 40px; border-radius: 11px; flex: none;
                   display: flex; align-items: center; justify-content: center; color: #fff; }
    .mcard .nm { flex: 1; min-width: 0; }
    .mcard .nm b { display: block; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mcard .nm .tag { margin-top: 3px; display: inline-block; }
    .star { background: none; border: none; color: var(--ink-2); padding: 8px; cursor: pointer; }
    .star.on { color: #f5b400; }
    .star .f { fill: none; } .star.on .f { fill: currentColor; }
    .mcard .chev { color: var(--ink-2); flex: none; }
    /* ---- bottom tab bar ---- */
    #mtabs { display: flex; position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
             height: calc(56px + env(safe-area-inset-bottom)); padding-bottom: env(safe-area-inset-bottom);
             background: var(--glass); border-top: 1px solid var(--line);
             -webkit-backdrop-filter: blur(20px) saturate(180%); backdrop-filter: blur(20px) saturate(180%); }
    #mtabs button { flex: 1; background: none; border: none; color: var(--ink-2); font-size: 10.5px;
                    font-weight: 600; display: flex; flex-direction: column; align-items: center;
                    gap: 3px; justify-content: center; cursor: pointer; }
    #mtabs button.on { color: var(--accent); }
    /* ---- selected route bottom sheet ---- */
    #sheet { position: fixed; left: 0; right: 0; bottom: calc(56px + env(safe-area-inset-bottom));
             z-index: 28; background: var(--glass); border: 1px solid var(--line); border-bottom: none;
             border-radius: 20px 20px 0 0; box-shadow: 0 -12px 40px rgba(0,0,0,.35);
             -webkit-backdrop-filter: blur(24px) saturate(180%); backdrop-filter: blur(24px) saturate(180%);
             padding: 8px 16px 14px; max-height: 62vh; overflow-y: auto; }
    #sheet.show { display: block; }
    #sheet .grab { width: 36px; height: 4px; border-radius: 2px; background: var(--line); margin: 2px auto 12px; }
    .sh-head { display: flex; align-items: center; gap: 11px; margin-bottom: 12px; }
    .sh-head .tile { width: 44px; height: 44px; border-radius: 12px; flex: none;
                     display: flex; align-items: center; justify-content: center; color: #fff; }
    .sh-name { flex: 1; min-width: 0; }
    .sh-name b { display: block; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .iconbtn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--line);
               background: var(--chip); color: var(--ink-2); flex: none; cursor: pointer;
               display: flex; align-items: center; justify-content: center; padding: 0; }
    .sh-actions { display: flex; gap: 10px; margin-bottom: 4px; }
    .sh-actions button { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
                         padding: 12px 6px; border: 1px solid var(--line); border-radius: 14px;
                         background: var(--chip); color: var(--ink); font-size: 12.5px; font-weight: 600; cursor: pointer; }
    .sh-actions button svg { color: var(--accent); }
    .sh-row { display: flex; gap: 11px; align-items: flex-start; padding: 12px 2px; margin-top: 8px;
              border-top: 1px solid var(--line); font-size: 13.5px; }
    .sh-row:first-of-type { border-top: none; }
    .sh-row svg { flex: none; color: var(--accent); margin-top: 2px; }
    .sh-row .v { color: var(--ink-2); display: block; margin-top: 1px; font-size: 12.5px; }
    #msearch { flex: 1; padding: 11px 14px; border: 1px solid var(--line); border-radius: 999px;
               background: var(--glass); color: var(--ink); font-size: 15px;
               box-shadow: 0 4px 18px rgba(0,0,0,.18);
               -webkit-backdrop-filter: blur(18px) saturate(160%); backdrop-filter: blur(18px) saturate(160%); }
    #msearch:focus { outline: 2px solid var(--accent); }
    #mreset { width: 42px; height: 42px; flex: none; border-radius: 50%; border: 1px solid var(--line);
              background: var(--glass); color: var(--ink); font-size: 19px; cursor: pointer;
              box-shadow: 0 4px 18px rgba(0,0,0,.18);
              -webkit-backdrop-filter: blur(18px) saturate(160%); backdrop-filter: blur(18px) saturate(160%); }
    #msugg { background: var(--glass); border: 1px solid var(--line); border-radius: 18px;
             margin-top: 6px; overflow: hidden; box-shadow: 0 12px 32px rgba(0,0,0,.25);
             -webkit-backdrop-filter: blur(22px) saturate(160%); backdrop-filter: blur(22px) saturate(160%);
             max-height: 45vh; overflow-y: auto; }
    #msugg div { padding: 11px 14px; font-size: 14.5px; display: flex; align-items: center; gap: 9px; }
    #msugg div:active { background: var(--chip); }
    #mchips { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch;
              padding-bottom: 2px; }
    .mchip { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 999px;
             background: var(--glass); border: 1px solid var(--line); font-size: 13px; font-weight: 600;
             white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,.18);
             -webkit-backdrop-filter: blur(18px) saturate(160%); backdrop-filter: blur(18px) saturate(160%); }
    .mchip.off { opacity: .45; }
    .mchip .dot { width: 10px; height: 10px; border-radius: 50%; }
    .mchip .x { color: var(--ink-2); margin-left: 2px; }
  }
  @media (max-width: 480px) {
    #topbar { gap: 8px; padding: 0 10px; }
    #topbar .brand .suffix { display: none; }
    #topbar nav { gap: 0; }
    #topbar nav a { padding: 5px 7px; }
  }
</style>
</head>
<body>
<header id="topbar">
  <a class="brand" href="/combis/">mi<span>tehuacan</span>.mx <span class="suffix" style="color:var(--ink-2);font-weight:400">· Combis</span></a>
  <nav>
    <a href="/combis/" class="on" id="nav-map">Mapa</a>
    <a href="/combis/acerca/" id="nav-about">Acerca</a>
    <a href="#" id="lt-es">ES</a>
    <a href="#" id="lt-en">EN</a>
    <a href="#" id="theme-toggle" aria-label="tema / theme"><span class="ic-moon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg></span><span class="ic-sun"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span></a>
  </nav>
</header>
<div id="app">
  <div id="sidebar">
    <div id="tabs">
      <button data-pane="browse" class="on">Rutas</button>
      <button data-pane="plan">¿Cómo llego?</button>
    </div>

    <div class="pane on" id="pane-browse">
      <div id="controls">
        <input id="search" type="search" placeholder="Buscar ruta o colonia…" autocomplete="off">
        <div class="filters">
          <button data-kind="all" class="on">Todas</button>
          <button data-kind="local">Locales</button>
          <button data-kind="foránea">Foráneas</button>
        </div>
        <div id="count"></div>
      </div>
      <div id="list"></div>
      <div id="detail"></div>
    </div>

    <div class="pane" id="pane-plan">
      <div id="planner">
        <div class="field">
          <span class="dot" style="background:var(--ok)"></span>
          <input type="text" id="from" placeholder="¿Dónde estás? (dirección o lugar)" autocomplete="off">
          <button class="pin" data-which="from" title="Elegir en el mapa"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></button>
          <div class="sugg" id="sugg-from" hidden></div>
        </div>
        <div class="field">
          <span class="dot" style="background:#d4351c"></span>
          <input type="text" id="to" placeholder="¿A dónde vas?" autocomplete="off">
          <button class="pin" data-which="to" title="Elegir en el mapa"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></button>
          <div class="sugg" id="sugg-to" hidden></div>
        </div>
        <button id="go" disabled>Buscar combis</button>
        <div id="plan-note">Sin horarios ni sentido de circulación — muestra qué rutas pasan cerca, no un itinerario exacto. Siempre te lleva a la combi más cercana; los tramos a pie largos se marcan con ⚠️.</div>
      </div>
      <div id="results"></div>
    </div>
  </div>
  <div id="map">
    <div id="mbar">
      <div id="mrow">
        <input id="msearch" type="search" placeholder="Busca tu ruta o colonia…" autocomplete="off">
        <button id="mreset" title="Reiniciar" aria-label="Reiniciar">↺</button>
      </div>
      <div id="msugg" hidden></div>
      <div id="mchips"></div>
    </div>
  </div>
  <div id="mlist">
    <input id="ml-search" type="search" autocomplete="off">
    <div id="ml-pills">
      <button data-mk="all" class="on"></button>
      <button data-mk="local"></button>
      <button data-mk="foránea"></button>
      <button data-mk="fav"></button>
    </div>
    <div id="ml-count"></div>
    <div id="ml-cards"></div>
  </div>
</div>
<nav id="mtabs">
  <button data-v="list"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/></svg><span id="mt-list"></span></button>

// first-party feature/problem beacon (no third parties; see /acerca/ créditos)
function track(event, label) {

    const data = JSON.stringify({event, label, path: location.pathname});

  } catch (e) { /* analytics must never break the app */ }
}
window.addEventListener('error', e => track('js_error', (e.message || 'error') + ' @ ' + (e.filename || '').split('/').pop() + ':' + e.lineno));

// data-driven boundary (computed at build time in 06_build_map.py): weighted network
// center + radius to the farthest route point; movement locked to that circle
const BOUNDS = (ROUTES.properties && ROUTES.properties.bounds) || {center: [-97.396, 18.462], radius_km: 30};
const CENTER = BOUNDS.center;
const RADIUS_KM = BOUNDS.radius_km;
const KMLON = 111.32 * Math.cos(CENTER[1] * Math.PI / 180), KMLAT = 110.57;
const dLon = RADIUS_KM / KMLON, dLat = RADIUS_KM / KMLAT;
// pan bounds get 40% margin beyond the circle so fitBounds on edge routes
// isn't clamped (tight bounds were cutting route tails off-screen)

});
map.addControl(new maplibregl.NavigationControl(), 'top-right');

const boundaryCircle = (() => {
  const pts = [];
  for (let i = 0; i <= 96; i++) {
    const a = i / 96 * 2 * Math.PI;
    pts.push([CENTER[0] + dLon * Math.cos(a), CENTER[1] + dLat * Math.sin(a)]);
  }
  return {type: 'Feature', properties: {}, geometry: {type: 'LineString', coordinates: pts}};
})();

const feats = ROUTES.features;

/* ---------- geometry in meter space ---------- */
const MLAT = 110570, MLON = 111320 * Math.cos(18.462 * Math.PI / 180);
const mx = c => [c[0] * MLON, c[1] * MLAT];
const distM = (a, b) => Math.hypot(a[0] - b[0], a[1] - b[1]);

// flatten each route once: vertices in meter space + cumulative distance, with part breaks
const flat = feats.map(f => {
  const pts = [], cum = [], brk = new Set();
  let d = 0, prev = null;
  f.geometry.coordinates.forEach(part => {
    if (pts.length) brk.add(pts.length - 1); // no segment across parts
    part.forEach(c => {
      const p = mx(c);
      if (prev) d += distM(prev, p);
      pts.push(p); cum.push(d); prev = p;
    });
    prev = null;
  });
  return {id: f.properties.id, f, pts, cum, brk};
});

function nearest(ptM, r) {
  let best = {d: Infinity, at: 0, lnglat: null};
  for (let i = 0; i < r.pts.length - 1; i++) {
    if (r.brk.has(i)) continue;
    const a = r.pts[i], b = r.pts[i + 1];
    const abx = b[0] - a[0], aby = b[1] - a[1];
    const len2 = abx * abx + aby * aby;
    let t = len2 ? ((ptM[0] - a[0]) * abx + (ptM[1] - a[1]) * aby) / len2 : 0;
    t = Math.max(0, Math.min(1, t));
    const proj = [a[0] + t * abx, a[1] + t * aby];
    const d = distM(ptM, proj);
    if (d < best.d) best = {d, at: r.cum[i] + t * (r.cum[i + 1] - r.cum[i]),
                            lnglat: [proj[0] / MLON, proj[1] / MLAT]};
  }
  return best;
}

function routePairMinDist(r1, r2) {
  let best = {d: Infinity, p1: null, p2: null};
  const step1 = Math.max(1, Math.floor(r1.pts.length / 250));
  const step2 = Math.max(1, Math.floor(r2.pts.length / 250));
  for (let i = 0; i < r1.pts.length; i += step1)
    for (let j = 0; j < r2.pts.length; j += step2) {
      const d = distM(r1.pts[i], r2.pts[j]);
      if (d < best.d) best = {d, i, j};
    }
  if (!isFinite(best.d)) return best;
  return {d: best.d,
          p1: {at: r1.cum[best.i], lnglat: [r1.pts[best.i][0] / MLON, r1.pts[best.i][1] / MLAT]},
          p2: {at: r2.cum[best.j], lnglat: [r2.pts[best.j][0] / MLON, r2.pts[best.j][1] / MLAT]}};
}

/* ---------- trip search ---------- */
const WALK_MAX = 700, WALK_FAR = 1300, TRANSFER_MAX = 400;

function findTrips(A, B) {
  const Am = mx(A), Bm = mx(B);
  const all = flat.map(r => ({r, na: nearest(Am, r), nb: nearest(Bm, r)}));
  // tiered: comfortable walk → long walk → nearest 5 whatever the distance.
  // never returns an empty candidate set: you always walk to the nearest combi.
  const take = (key, lim) => all.filter(x => x[key].d <= lim).map(x => ({r: x.r, n: x[key]}));
  const takeNearest = key => all.slice().sort((x, y) => x[key].d - y[key].d).slice(0, 5)
                                .map(x => ({r: x.r, n: x[key]}));
  let nearA = take('na', WALK_MAX);
  if (!nearA.length) nearA = take('na', WALK_FAR);
  if (!nearA.length) nearA = takeNearest('na');
  let nearB = take('nb', WALK_MAX);
  if (!nearB.length) nearB = take('nb', WALK_FAR);
  if (!nearB.length) nearB = takeNearest('nb');
  nearA.sort((x, y) => x.n.d - y.n.d);
  nearB.sort((x, y) => x.n.d - y.n.d);

  const opts = [];
  // direct
  nearA.forEach(a => {
    const b = nearB.find(b => b.r.id === a.r.id);
    if (!b) return;
    const ride = Math.abs(b.n.at - a.n.at);
    if (ride < 150) return; // walking distance anyway
    opts.push({type: 'direct', legs: [a.r.id], walkA: a.n.d, walkB: b.n.d, ride,
               board: a.n.lnglat, alight: b.n.lnglat, boardAt: a.n.at,
               score: 2 * (a.n.d + b.n.d) + 0.25 * ride});
  });
  // one transfer
  const directIds = new Set(opts.map(o => o.legs[0]));
  const genTransfers = maxT => {
    nearA.slice(0, 8).forEach(a => {
      nearB.slice(0, 8).forEach(b => {
        if (a.r.id === b.r.id) return;
        if (directIds.has(a.r.id) && directIds.has(b.r.id)) return;
        const x = routePairMinDist(a.r, b.r);
        if (x.d > maxT) return;
        const ride1 = Math.abs(x.p1.at - a.n.at), ride2 = Math.abs(b.n.at - x.p2.at);
        if (ride1 < 150 || ride2 < 150) return;
        opts.push({type: 'transfer', legs: [a.r.id, b.r.id], walkA: a.n.d, walkB: b.n.d,
                   transfer: x.d, tPoint: x.p1.lnglat, tPoint2: x.p2.lnglat,
                   board: a.n.lnglat, alight: b.n.lnglat, ride: ride1 + ride2, boardAt: a.n.at,
                   score: 2 * (a.n.d + b.n.d) + 2 * x.d + 0.25 * (ride1 + ride2) + 600});
      });
    });
  };
  genTransfers(TRANSFER_MAX);
  // still nothing? allow a walking connection between the two nearest lines,
  // whatever the distance — always give the best available answer.
  if (!opts.length) genTransfers(Infinity);
  // dedupe by legs signature, keep best score
  const bySig = {};
  opts.forEach(o => {
    const sig = o.legs.join('|');
    if (!bySig[sig] || o.score < bySig[sig].score) bySig[sig] = o;
  });
  return Object.values(bySig).sort((a, b) => a.score - b.score).slice(0, 5);
}

/* ---------- geocoding (Photon primary, Nominatim fallback; no Google) ---------- */
async function geocode(q) {
  try {
    // note: no lang param — photon 400s on lang=es (only en/de/fr supported)
    const r = await fetch('https://photon.komoot.io/api?q=' + encodeURIComponent(q) +
                          '&lat=18.462&lon=-97.396&limit=6');
    const d = await r.json();
    const res = d.features.map(f => ({
      name: f.properties.name || f.properties.street || q,
      detail: [f.properties.street, f.properties.district, f.properties.city, f.properties.state]
              .filter(Boolean).join(', '),
      c: f.geometry.coordinates
    })).filter(x => Math.abs(x.c[0] + 97.4) < 0.5 && Math.abs(x.c[1] - 18.46) < 0.5);
    if (res.length) return res;
  } catch (e) { /* fall through */ }
  try {
    const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=6&viewbox=-97.78,18.13,-97.01,18.79&bounded=1&q=' + encodeURIComponent(q));
    const d = await r.json();
    return d.map(x => ({name: x.display_name.split(',')[0],
                        detail: x.display_name.split(',').slice(1, 4).join(','),
                        c: [+x.lon, +x.lat]}));
  } catch (e) { return []; }
}

/* ---------- browse pane ---------- */
const norm = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

function visible(f) {
  const p = f.properties;
  if (state.kind !== 'all' && p.kind !== state.kind) return false;
  if (state.q) {
    const hay = norm('ruta ' + p.name + ' ' + (p.alias || '') + ' ' + (p.colonias || '') + ' ' + (p.places || ''));
    if (!hay.includes(norm(state.q))) return false;
  }
  return true;
}

function applyFilter() {
  const ids = feats.filter(visible).map(f => f.properties.id);
  const base = ['in', ['get', 'id'], ['literal', ids]];
  map.setFilter('routes', base);
  map.setFilter('routes-casing', base);
  renderList();
  document.getElementById('count').textContent = t('count')(ids.length, feats.length);
}

/* ---------- next-combi estimate: departures every headway from first_run,
   travel time from route start at ~16 km/h. No live GPS — labeled estimate. */
const COMBI_MIN_PER_M = 1 / (16 * 1000 / 60);
const toMinOfDay = tt => { const [h, m] = tt.split(':').map(Number); return h * 60 + m; };
const fmtClock = min => { const m = ((Math.round(min) % 1440) + 1440) % 1440;
  return String(Math.floor(m / 60)).padStart(2, '0') + ':' + String(m % 60).padStart(2, '0'); };

function nextCombiAt(routeId, atM) {
  const s = SCHEDULES[routeId];
  if (!s || !s.headway_min || !s.first_run) return null;
  const travel = atM * COMBI_MIN_PER_M;
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  const first = toMinOfDay(s.first_run);
  const last = s.last_run ? toMinOfDay(s.last_run) : first;
  let k = Math.ceil((nowMin - travel - first) / s.headway_min);
  if (k < 0) k = 0;
  const dep = first + k * s.headway_min;
  if (dep > last) return {done: true, next: first + travel};
  return {arr: dep + travel, wait: Math.max(0, dep + travel - nowMin)};
}

function etaPopup(id, lngLat) {
  const r = flat.find(x => x.id === id);
  if (!r || !r.pts.length) return;
  const n = nearest(mx([lngLat.lng, lngLat.lat]), r);
  const e = nextCombiAt(id, n.at);
  const body = !e ? t('etaNoSched')
    : e.done ? t('etaDone')(fmtClock(e.next))
    : t('etaNext')(fmtClock(e.arr), Math.max(1, Math.round(e.wait)));
  new maplibregl.Popup({closeButton: false})
    .setLngLat(n.lnglat || [lngLat.lng, lngLat.lat])
    .setHTML('<b>' + routeById(id).name + '</b><br>' + body +
             (e ? '<br><span style="opacity:.65;font-size:11px">' + t('etaModel') + '</span>' : ''))
    .addTo(map);
  track('eta_check', id);
}

const P = {from: null, to: null, markers: {}, pickArm: null};

function setPoint(which, c, label) {
  P[which] = c;
  if (label) document.getElementById(which).value = label;
  if (P.markers[which]) P.markers[which].remove();
  P.markers[which] = new maplibregl.Marker({color: which === 'from' ? '#1a7f37' : '#d4351c'})
    .setLngLat(c).addTo(map);
  updateGo();
}

function updateGo() {
  const ok = w => P[w] || document.getElementById(w).value.trim().length >= 3;
  document.getElementById('go').disabled = !(ok('from') && ok('to'));
}

async function resolvePoint(which) {
  if (P[which]) return true;
  const q = document.getElementById(which).value.trim();
  if (q.length < 3) return false;
  let res = await geocode(q + ', Tehuacán');
  if (!res.length) res = await geocode(q);
  if (!res.length) return false;
  setPoint(which, res[0].c, res[0].name);
  return true;
}

function attachAutocomplete(which) {
  const input = document.getElementById(which);
  const box = document.getElementById('sugg-' + which);
  let t = null;
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { box.hidden = true; document.getElementById('go').click(); }
  });
  input.addEventListener('input', () => {
    P[which] = null;
    updateGo();
    clearTimeout(t);
    const q = input.value.trim();
    if (q.length < 3) { box.hidden = true; return; }
    t = setTimeout(async () => {
      let res = await geocode(q + ', Tehuacán');
      if (!res.length) res = await geocode(q);
      box.innerHTML = '';
      res.slice(0, 5).forEach(r => {
        const d = document.createElement('div');
        d.innerHTML = r.name + (r.detail ? ' <span class="muted">' + r.detail + '</span>' : '');
        d.onclick = () => { box.hidden = true; setPoint(which, r.c, r.name); };
        box.appendChild(d);
      });
      box.hidden = res.length === 0;
    }, 350);
  });
  input.addEventListener('blur', () => setTimeout(() => box.hidden = true, 250));
}

    if (o.tPoint2) {
      ptFeats.push({type: 'Feature', properties: {}, geometry: {type: 'Point', coordinates: o.tPoint2}});
      walkFeats.push({type: 'Feature', properties: {}, geometry: {type: 'LineString', coordinates: [o.tPoint, o.tPoint2]}});

// brighten only the BASEMAP layers in dark mode by rewriting the style's own colors —
// our route layers are added afterwards and keep their exact colors
function brightenBasemap() {
  if (!dark) return;
  const ctx = document.createElement('canvas').getContext('2d');
  const parseColor = c => {
    ctx.fillStyle = '#010203'; ctx.fillStyle = c;
    const v = ctx.fillStyle;
    if (v === '#010203' && c !== '#010203') return null;   // not a parseable color
    if (v.startsWith('#')) return [parseInt(v.slice(1,3),16), parseInt(v.slice(3,5),16), parseInt(v.slice(5,7),16), 1];
    const m = v.match(/rgba?\(([\d.]+), ?([\d.]+), ?([\d.]+)(?:, ?([\d.]+))?\)/);
    return m ? [+m[1], +m[2], +m[3], m[4] === undefined ? 1 : +m[4]] : null;
  };
  const lighten = (c, amt) => {
    const p = parseColor(c);
    if (!p) return c;
    const [r, g, b, a] = p;
    return `rgba(${Math.round(r+(255-r)*amt)},${Math.round(g+(255-g)*amt)},${Math.round(b+(255-b)*amt)},${a})`;
  };
  const walk = (v, amt) => {
    if (typeof v === 'string') return lighten(v, amt);
    if (Array.isArray(v)) return v.map(x => walk(x, amt));
    return v;
  };
  // bright labels, faint street lines: names orient, geometry recedes
  const PROPS = {line: [['line-color', 0.13]], symbol: [['text-color', 0.55]],
                 fill: [['fill-color', 0.06], ['fill-outline-color', 0.06]]};
  for (const lyr of map.getStyle().layers) {
    for (const [prop, amt] of (PROPS[lyr.type] || [])) {
      const cur = map.getPaintProperty(lyr.id, prop);
      if (cur !== undefined) {
        try { map.setPaintProperty(lyr.id, prop, walk(cur, amt)); } catch (e) { /* leave as-is */ }
      }
    }
  }
}

  map.addLayer({

    layout: {'line-cap': 'round', 'line-join': 'round'},
    paint: {'line-color': ['get', 'color'],
            'line-width': ['interpolate', ['linear'], ['zoom'], 11, 1.8, 15, 3.5],

  });
  map.addLayer({
    id: 'plan-walk', type: 'line', source: 'plan-walk',
    paint: {'line-color': dark ? '#ececf0' : '#1a1a1e', 'line-width': 2.5, 'line-dasharray': [1.2, 1.6]}
  });
  map.addLayer({
    id: 'plan-pts', type: 'circle', source: 'plan-pts',
    paint: {'circle-radius': 7, 'circle-color': '#f5a623',
            'circle-stroke-width': 2.5, 'circle-stroke-color': dark ? '#141419' : '#f2f2f5'}
  });

  const popup = new maplibregl.Popup({closeButton: false, closeOnClick: false});
  map.on('mousemove', 'routes', e => {
    if (P.pickArm) return;
    map.getCanvas().style.cursor = 'pointer';
    const names = [...new Set(e.features.map(f => f.properties.name))].slice(0, 4);
    popup.setLngLat(e.lngLat).setHTML(names.join('<br>')).addTo(map);
  });
  map.on('mouseleave', 'routes', () => {
    if (P.pickArm) return;
    map.getCanvas().style.cursor = '';
    popup.remove();
  });
  map.on('click', e => {
    if (P.pickArm) {
      const which = P.pickArm;
      P.pickArm = null;
      document.querySelectorAll('.pin').forEach(x => x.classList.remove('armed'));
      map.getCanvas().style.cursor = '';
      setPoint(which, [e.lngLat.lng, e.lngLat.lat],
               e.lngLat.lat.toFixed(4) + ', ' + e.lngLat.lng.toFixed(4) + t('mapPoint'));
      return;
    }
    const hit = map.queryRenderedFeatures(e.point, {layers: ['routes']});
    if (!hit.length) return;
    const id = hit[0].properties.id;
    if (isMobile()) {
      const already = M.chips.some(c => c.id === id && c.on);
      mAddRoute(id);
      if (already && SCHEDULES[id]) etaPopup(id, e.lngLat);  // second tap = when's the next one here
      else openSheet(id);                                    // first tap = route panel (sheet)
    } else if (document.querySelector('#tabs button.on').dataset.pane === 'browse') {
      if (state.sel === id) etaPopup(id, e.lngLat);          // second click on selected route = ETA here
      else select(id, false);
    }
  });

  applyFilter();

  // deep link: /combis/?ruta=<id> pre-selects a route (used by sharing + QR);
  // otherwise restore the last session's routes from the device
  const ruta = params.get('ruta');
  if (ruta && feats.some(f => f.properties.id === ruta)) {
    if (isMobile()) {
      M.chips = [{id: ruta, on: true}];
      mSetView('map');
      mApply(true);
      openSheet(ruta);
    } else select(ruta, true);
  } else if (BOOT) {
    if (isMobile() && Array.isArray(BOOT.chips) && BOOT.chips.length) {
      M.chips = BOOT.chips.filter(c => c && feats.some(f => f.properties.id === c.id));
      if (M.chips.length) mApply(false);
    } else if (!isMobile() && BOOT.sel && feats.some(f => f.properties.id === BOOT.sel)) {
      select(BOOT.sel, true);
    }
  }
});

/* ---------- mobile all-map bar: fuzzy search, chips, reset ---------- */
const M = {chips: []};  // [{id, on}]
const isMobile = () => matchMedia('(max-width: 700px)').matches;

function fuzzyScore(q, hay) {
  const i = hay.indexOf(q);
  if (i >= 0) return 1000 - i;                      // substring: earlier = better
  let qi = 0;                                        // subsequence fallback
  for (let h = 0; h < hay.length && qi < q.length; h++) if (hay[h] === q[qi]) qi++;
  return qi === q.length ? 100 - q.length : -1;
}

function mApply(fit) {
  const on = M.chips.filter(c => c.on).map(c => c.id);
  const base = on.length ? on : feats.map(f => f.properties.id);
  map.setFilter('routes', ['in', ['get', 'id'], ['literal', base]]);
  map.setFilter('routes-casing', ['in', ['get', 'id'], ['literal', base]]);
  map.setPaintProperty('routes', 'line-opacity', on.length ? 1 : 0.85);
  map.setPaintProperty('routes', 'line-width', on.length ? 4
    : ['interpolate', ['linear'], ['zoom'], 11, 1.8, 15, 3.5]);
  setSponsorPins(on);
  mRenderChips();
  if (typeof saveStatus === 'function') saveStatus();
  if (fit && on.length) {
    const b = new maplibregl.LngLatBounds();
    on.forEach(id => feats.find(f => f.properties.id === id).geometry.coordinates.flat().forEach(c => b.extend(c)));
    map.fitBounds(b, {padding: {top: 130, left: 30, right: 30, bottom: 40}, duration: 500});
  }
}

function mRenderChips() {
  const el = document.getElementById('mchips');
  el.innerHTML = '';
  M.chips.forEach(c => {
    const p = feats.find(f => f.properties.id === c.id).properties;
    const d = document.createElement('div');
    d.className = 'mchip' + (c.on ? '' : ' off');
    d.innerHTML = '<span class="dot" style="background:' + p.color + '"></span>' + p.name +
                  '<span class="x" data-x="1">✕</span>';
    d.onclick = e => {
      if (e.target.dataset.x) M.chips = M.chips.filter(x => x.id !== c.id);
      else c.on = !c.on;
      mApply(false);
    };
    el.appendChild(d);
  });
}

function mAddRoute(id) {
  const c = M.chips.find(x => x.id === id);
  if (c) c.on = true;
  else M.chips.push({id, on: true});
  track('route_select', id);
  mApply(true);
}

// towns/colonias are first-class search results: picking one toggles ON every
// route that passes through it (routes themselves match by name/alias only)
let PLACE_INDEX = null;
function buildPlaceIndex() {
  const idx = {};
  feats.forEach(f => {
    const p = f.properties;
    ((p.places || '') + ',' + (p.colonias || '')).split(',').forEach(raw => {
      const label = raw.trim();
      if (label.length < 3) return;
      const key = norm(label);
      if (!idx[key]) idx[key] = {label, ids: new Set()};
      idx[key].ids.add(p.id);
    });
  });
  // second tier: OSM towns no route reaches → the nearest lines toward them
  // ("zina" must still answer with the Coxcatlán-corridor combis)
  (ROUTES.properties.all_places || []).forEach(pl => {
    const key = norm(pl.name);
    if (idx[key]) return;
    const ptM = mx([pl.lon, pl.lat]);
    const ds = flat.map(r => ({id: r.id, d: nearest(ptM, r).d})).sort((a, b) => a.d - b.d);
    if (!ds.length || ds[0].d > 12000) return;
    const ids = ds.filter(x => x.d <= ds[0].d + 2000).slice(0, 4).map(x => x.id);
    idx[key] = {label: pl.name, ids: new Set(ids), farKm: Math.max(1, Math.round(ds[0].d / 1000))};
  });
  return Object.values(idx);
}

function mAddMany(ids, trackLabel) {
  ids.forEach(id => {
    const c = M.chips.find(x => x.id === id);
    if (c) c.on = true; else M.chips.push({id, on: true});
  });
  track('town_select', trackLabel);
  mApply(true);
}

const msearch = document.getElementById('msearch');
const msugg = document.getElementById('msugg');
msearch.addEventListener('input', () => {
  const q = norm(msearch.value.trim());
  if (q.length < 2) { msugg.hidden = true; return; }
  if (!PLACE_INDEX) PLACE_INDEX = buildPlaceIndex();
  const routes = feats.map(f => {
    const p = f.properties;
    return {p, s: fuzzyScore(q, norm(p.name + ' ' + (p.alias || '')))};
  }).filter(x => x.s > 0).sort((a, b) => b.s - a.s).slice(0, 6);
  const places = PLACE_INDEX.map(pl => ({pl, s: fuzzyScore(q, norm(pl.label))}))
    .filter(x => x.s > 0).sort((a, b) => b.s - a.s || b.pl.ids.size - a.pl.ids.size).slice(0, 3);
  msugg.innerHTML = '';
  places.forEach(({pl}) => {
    const d = document.createElement('div');
    d.innerHTML = '<span style="flex:none;color:var(--ink-2)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></span><span style="flex:1">' + pl.label + '</span>' +
                  '<span class="tag">' + t('nearTag')(pl.ids.size, pl.farKm) + '</span>';
    d.onclick = () => { msugg.hidden = true; msearch.value = ''; mAddMany([...pl.ids], pl.label); };
    msugg.appendChild(d);
  });
  routes.forEach(({p}) => {
    const d = document.createElement('div');
    d.innerHTML = '<span class="swatch" style="background:' + p.color + '"></span>' +
                  '<span style="flex:1">' + p.name + '</span>' +
                  (p.kind === 'foránea' ? '<span class="tag">' + t('tagForanea') + '</span>' : '');
    d.onclick = () => { msugg.hidden = true; msearch.value = ''; mAddRoute(p.id); };
    msugg.appendChild(d);
  });
  msugg.hidden = (places.length + routes.length) === 0;
});

document.getElementById('mreset').onclick = () => {
  M.chips = [];
  msearch.value = '';
  msugg.hidden = true;
  track('mobile_reset');
  mApply(false);
  map.flyTo({center: CENTER, zoom: 12.4, duration: 500});
};

/* ---------- mobile app shell: LIST or MAP view (never both), favorites,
   bottom tab bar, selected-route bottom sheet (available in either view) ---------- */
const S_BUS = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v11"/><path d="M5 11h14"/><path d="M3 17h18"/><circle cx="8.5" cy="19.5" r="1.3"/><circle cx="15.5" cy="19.5" r="1.3"/></svg>';
const S_STAR = '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path class="f" d="m12 2 3.1 6.3 6.9 1-5 4.9 1.2 6.8-6.2-3.2-6.2 3.2L7 14.2 2 9.3l6.9-1L12 2Z"/></svg>';
const S_CHEV = '<svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>';
const S_MAPI = '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3 3 5v16l6-2 6 2 6-2V3l-6 2-6-2Z"/><path d="M9 3v16m6-14v16"/></svg>';
const S_SHARE = '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13"/><path d="m7 8 5-5 5 5"/><path d="M5 13v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/></svg>';
const S_ROUTE = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="2"/><circle cx="18" cy="5" r="2"/><path d="M8 19h6a4 4 0 0 0 0-8H10a4 4 0 0 1 0-8h6"/></svg>';
const S_PIN2 = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>';
const S_CLOCK = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
const S_X = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>';

const MV = {kind: 'all', q: '', fav: new Set()};
try { MV.fav = new Set(JSON.parse(localStorage.mtFav || '[]')); } catch (e) {}
const favSave = () => { try { localStorage.mtFav = JSON.stringify([...MV.fav]); } catch (e) {} };

// app status lives on the device: last view, filter, active routes, open sheet,
// desktop selection — restored on the next visit (deep links take precedence)
let BOOT = null;
try { BOOT = JSON.parse(localStorage.mtStatus || 'null'); } catch (e) {}
function saveStatus() {
  try {
    localStorage.mtStatus = JSON.stringify({
      view: document.body.dataset.mview || 'list',
      kind: MV.kind,
      chips: M.chips,
      sheet: SHEET,
      sel: state.sel,
    });
  } catch (e) {}
}

function mSyncUI() {
  const v = document.body.dataset.mview || 'list';
  const activeTab = v === 'list' ? (MV.kind === 'fav' ? 'fav' : 'list') : v;
  document.querySelectorAll('#mtabs button').forEach(b => b.classList.toggle('on', b.dataset.v === activeTab));
  document.querySelectorAll('#ml-pills button').forEach(x => x.classList.toggle('on', x.dataset.mk === MV.kind));
  if (v === 'list') renderCards();
  if (v === 'map') setTimeout(() => map.resize(), 80);
}

function mSetView(v) {  // list | map | fav | cfg
  if (v === 'cfg') { openSettings(); return; }
  if (v === 'fav') { MV.kind = 'fav'; v = 'list'; }
  else if (v === 'list' && MV.kind === 'fav') MV.kind = 'all';
  document.body.dataset.mview = v;
  mSyncUI();
  saveStatus();
}

function mlVisible(f) {
  const p = f.properties;
  if (MV.kind === 'fav') { if (!MV.fav.has(p.id)) return false; }
  else if (MV.kind !== 'all' && p.kind !== MV.kind) return false;
  if (MV.q) {
    const hay = norm('ruta ' + p.name + ' ' + (p.alias || '') + ' ' + (p.colonias || '') + ' ' + (p.places || ''));
    if (!hay.includes(norm(MV.q))) return false;
  }
  return true;
}

function renderCards() {
  const el = document.getElementById('ml-cards');
  const vis = feats.filter(mlVisible);
  document.getElementById('ml-count').textContent = t('found')(vis.length);
  el.innerHTML = '';
  vis.forEach(f => {
    const p = f.properties;
    const d = document.createElement('div');
    d.className = 'mcard';
    d.innerHTML = '<span class="bar" style="background:' + p.color + '"></span>' +
      '<span class="tile" style="background:' + p.color + '">' + S_BUS + '</span>' +
      '<span class="nm"><b>' + p.name + '</b>' +
      (p.kind === 'foránea' ? '<span class="tag">' + t('tagForanea') + '</span>' : '') + '</span>' +
      '<button class="star' + (MV.fav.has(p.id) ? ' on' : '') + '" aria-label="favorita">' + S_STAR + '</button>' +
      S_CHEV;
    d.querySelector('.star').onclick = e => { e.stopPropagation(); favToggle(p.id); };
    d.onclick = () => openSheet(p.id);
    el.appendChild(d);
  });
}

function favToggle(id) {
  if (MV.fav.has(id)) MV.fav.delete(id); else MV.fav.add(id);
  favSave();
  renderCards();
  if (SHEET === id) openSheet(id);
  track('fav_toggle', id);
}

let SHEET = null;
function closeSheet() { SHEET = null; document.getElementById('sheet').classList.remove('show'); saveStatus(); }

function shRow(icon, label, value) {
  return '<div class="sh-row">' + icon + '<div><b>' + label + '</b><span class="v">' + value + '</span></div></div>';
}

function openSheet(id) {
  SHEET = id;
  const p = routeById(id);
  const s = SCHEDULES[id];
  const el = document.getElementById('sheet');
  const towns = (p.places || '').split(',').map(x => x.trim()).filter(Boolean);
  const rec = towns.length > 1 ? towns[0] + ' → ' + towns[towns.length - 1] : (towns[0] || p.name);
  const cols = (p.colonias || '').split(',').map(x => x.trim().replace('Colonia ', '')).filter(Boolean);
  el.innerHTML = '<div class="grab"></div>' +
    '<div class="sh-head"><span class="tile" style="background:' + p.color + '">' + S_BUS + '</span>' +
    '<span class="sh-name"><b>' + p.name + '</b><span class="tag">' + t('detKind')(p.kind) + '</span></span>' +
    '<button class="iconbtn star' + (MV.fav.has(id) ? ' on' : '') + '" id="sh-fav">' + S_STAR + '</button>' +
    '<button class="iconbtn" id="sh-close">' + S_X + '</button></div>' +
    '<div class="sh-actions">' +
    '<button id="sh-map">' + S_MAPI + t('viewOnMap') + '</button>' +
    '<button id="sh-share">' + S_SHARE + t('shareBtn') + '</button></div>' +
    shRow(S_ROUTE, t('rowRoute'), rec) +
    (cols.length ? shRow(S_PIN2, t('rowCols'), t('nCols')(cols.length) + ' · ' + cols.slice(0, 5).join(', ') + (cols.length > 5 ? '…' : '')) : '') +
    shRow(S_CLOCK, t('rowSched'), s ? t('schedule')(s) : t('schedNone'));
  el.classList.add('show');
  document.getElementById('sh-close').onclick = closeSheet;
  document.getElementById('sh-fav').onclick = () => favToggle(id);
  document.getElementById('sh-map').onclick = () => {
    M.chips = [{id, on: true}];
    mSetView('map');
    mApply(true);
  };
  document.getElementById('sh-share').onclick = () => shareRoute(id);
  saveStatus();
  track('route_select', id);
}

async function shareRoute(id) {
  const url = location.origin + '/combis/?ruta=' + encodeURIComponent(id);
  const p = routeById(id);
  try {
    if (navigator.share) {
      await navigator.share({title: 'Combi ' + p.name + ' — MiTehuacán', url});
    } else {
      await navigator.clipboard.writeText(url);
      const b = document.getElementById('sh-share');
      if (b) { b.lastChild.textContent = t('linkCopied'); setTimeout(() => { if (SHEET === id) openSheet(id); }, 1600); }
    }
    track('share', id);
  } catch (e) { /* user cancelled the share sheet */ }
}

function openSettings() {
  SHEET = null;
  const el = document.getElementById('sheet');
  const TH = document.documentElement.dataset.theme;
  const on = ' style="border-color:var(--accent);color:var(--accent)"';
  el.innerHTML = '<div class="grab"></div>' +
    '<div class="sh-head"><span class="sh-name"><b>' + t('mtCfg') + '</b></span>' +
    '<button class="iconbtn" id="sh-close">' + S_X + '</button></div>' +
    '<div class="sh-row"><div style="flex:1;padding-top:9px"><b>' + t('cfgLang') + '</b></div>' +
    '<div class="sh-actions" style="margin:0;flex:1.4">' +
    '<button id="cfg-es"' + (LANG === 'es' ? on : '') + '>ES</button>' +
    '<button id="cfg-en"' + (LANG === 'en' ? on : '') + '>EN</button></div></div>' +
    '<div class="sh-row"><div style="flex:1;padding-top:9px"><b>' + t('cfgTheme') + '</b></div>' +
    '<div class="sh-actions" style="margin:0;flex:1.4">' +
    '<button id="cfg-light"' + (TH === 'light' ? on : '') + '>' + t('cfgLight') + '</button>' +
    '<button id="cfg-dark"' + (TH === 'dark' ? on : '') + '>' + t('cfgDark') + '</button></div></div>' +
    '<div class="sh-row"><a href="/combis/acerca/" style="color:var(--accent);font-weight:600">' + t('cfgAbout') + '</a></div>';
  el.classList.add('show');
  document.getElementById('sh-close').onclick = closeSheet;
  const save = (k, v) => { try { localStorage[k] = v; } catch (e) {} location.reload(); };
  document.getElementById('cfg-es').onclick = () => save('mtLang', 'es');
  document.getElementById('cfg-en').onclick = () => save('mtLang', 'en');
  document.getElementById('cfg-light').onclick = () => save('mtTheme', 'light');
  document.getElementById('cfg-dark').onclick = () => save('mtTheme', 'dark');
}

document.querySelectorAll('#mtabs button').forEach(b => b.onclick = () => mSetView(b.dataset.v));
document.getElementById('ml-search').addEventListener('input', e => { MV.q = e.target.value.trim(); renderCards(); });
document.querySelectorAll('#ml-pills button').forEach(b => b.onclick = () => {
  MV.kind = b.dataset.mk;
  mSyncUI();
  saveStatus();
});
if (isMobile()) {
  if (BOOT && ['all', 'local', 'foránea', 'fav'].includes(BOOT.kind)) MV.kind = BOOT.kind;
  document.body.dataset.mview = BOOT && BOOT.view === 'map' ? 'map' : 'list';
  mSyncUI();
  if (BOOT && BOOT.sheet && !params.get('ruta') && feats.some(f => f.properties.id === BOOT.sheet)) openSheet(BOOT.sheet);
}

document.getElementById('search').addEventListener('input', e => {
  state.q = e.target.value.trim().toLowerCase();
  if (state.q.length >= 3 && !window._qTracked) { window._qTracked = true; track('route_search'); }
  applyFilter();
});
document.querySelectorAll('.filters button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.filters button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    state.kind = b.dataset.kind;
    applyFilter();
  };
});
</script>
</body>
